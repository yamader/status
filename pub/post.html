<!DOCTYPE html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>入力フォーム :: YamaD status</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    main {
      font-family: serif;
      max-width: 48rem;
      padding: 2rem;
      margin: auto;
    }
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    footer {
      text-align: center;
    }
    h2::before {
      content: "# ";
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      font-size: 1.2em;
    }
    input {
      font-size: 1.2em;
    }
    label strong:first-child {
      display: inline-block;
      padding-right: .5rem;
      min-width: 5rem;
      text-align: end;
    }
    button {
      width: fit-content;
      padding: .5rem 4rem;
      font-size: 1.2rem;
      font-weight: bold;
    }
  </style>
</head>
<body x-data="{
  post(url, body) {
    console.log('asdf')
    return fetch(url, {
      method: 'POST',
      headers: {
        Authorization: 'Basic ' + btoa(`${$refs.username.value}:${$refs.password.value}`),
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(body),
    });
  },
}">
  <main>
    <header>
      <h1><a href="/">YamaD status</a> 入力フォーム</h1>
    </header>
    <hr>
    <h2>認証情報</h2>
    <input placeholder="username" autocomplete="username" x-ref="username">
    <input type="password" placeholder="password" autocomplete="current-password" x-ref="password">
    <h2>体重</h2>
    <form
      @submit="
        post('https://db.dyama.net/mass', {
          ts: Number(new Date(ts).getTime().toString().slice(0,-3)),
          mass: Number(mass),
          fat: Number(fat),
        }).then(e => {
          alert(e.status);
          if (e.ok) mass = fat = ''
        });
        $event.preventDefault();
      "
      x-data="{ ts: '', mass: '', fat: '' }"
    >
      <label>
        <strong>時刻</strong>
        <input type="datetime-local" name="ts" required x-model.fill="ts"
          x-init="$el.value ||= (new Date(Date.now()+3600_000*9)).toISOString().slice(0,-8)">
      </label>
      <label>
        <strong>体重</strong>
        <input type="number" name="mass" step="any" required x-model.fill="mass">
        kg
      </label>
      <label>
        <strong>体脂肪率</strong>
        <input type="number" name="fat" step="any" x-model.fill="fat">
        %
      </label>
      <button>送信</button>
    </form>
    <hr>
    <footer>
      <small>&copy; 2026 YamaD</small>
    </footer>
  </main>
</body>
